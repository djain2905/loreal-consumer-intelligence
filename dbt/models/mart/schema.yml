version: 2

models:
  - name: fct_reviews
    description: >
      Review-level fact table at the grain of one row per verified Sephora review.
      Enriched with desire language detection, sentiment classification, and
      complaint flagging to power Lancôme consumer whitespace analysis.
    config:
      meta:
        owner: dhwanijain2905@gmail.com
        grain: one row per review
    columns:
      - name: review_id
        description: MD5 surrogate key derived from author_id, product_id, submission_time, and review_text. Deduped upstream.
        tests:
          - not_null
          - unique
      - name: product_id
        description: Foreign key to dim_products.
        tests:
          - not_null
      - name: author_id
        description: Sephora reviewer identifier.
        tests:
          - not_null
      - name: rating
        description: Star rating 1–5 given by the reviewer.
        tests:
          - not_null
      - name: review_date
        description: Date the review was submitted, cast from raw submission_time.
      - name: is_recommended
        description: Boolean — reviewer explicitly recommends the product.
      - name: is_lancome
        description: Boolean — true when the reviewed product is a Lancôme product.
        tests:
          - not_null
      - name: sentiment_bucket
        description: Coarse sentiment derived from rating. positive (4–5), neutral (3), negative (1–2).
        tests:
          - not_null
          - accepted_values:
              values: ['positive', 'neutral', 'negative']
      - name: complaint_flag
        description: True when rating ≤ 2 or review contains explicit dissatisfaction language (e.g. broke out, doesn't work, returned).
        tests:
          - not_null
      - name: desire_flag
        description: True when review contains desire language — wish, want, need, hope, would love, if only, lacks, missing.
        tests:
          - not_null
      - name: desire_category
        description: Classifies the type of unmet consumer need. Null when desire_flag is false.
        tests:
          - accepted_values:
              values:
                - 'SPF & Sun Protection'
                - 'Shade Range & Inclusivity'
                - 'Key Ingredients'
                - 'Fragrance & Scent'
                - 'Sensitive Skin Formula'
                - 'Longevity & Wear'
                - 'Texture & Formula'
                - 'Packaging & Format'
                - 'Price & Value'
      - name: desire_text
        description: Full review text, populated only when desire_flag is true. Used for qualitative evidence in dashboard.

  - name: dim_products
    description: >
      One row per product, deduplicated from Sephora reviews source.
      Includes brand classification, price tier, and L'Oréal division assignment.
    config:
      meta:
        owner: dhwanijain2905@gmail.com
        grain: one row per product
    columns:
      - name: product_id
        description: Natural product identifier from Sephora.
        tests:
          - not_null
          - unique
      - name: product_name
        description: Display name of the product.
        tests:
          - not_null
      - name: brand
        description: Brand name as it appears on Sephora (alias of brand_name from staging).
        tests:
          - not_null
      - name: price_usd
        description: Product price in USD.
      - name: price_tier
        description: Budget (<$25), mid ($25–$50), or premium (>$50).
        tests:
          - not_null
          - accepted_values:
              values: ['budget', 'mid', 'premium']
      - name: division
        description: >
          L'Oréal division the brand belongs to. Lancôme → Luxe.
          Other Sephora brands default to Consumer Products unless explicitly mapped.
        tests:
          - not_null
          - accepted_values:
              values: ['Luxe', 'Consumer Products', 'Dermatological', 'Professional']

  - name: dim_brands
    description: >
      One row per brand present in the Sephora reviews dataset.
      Assigns each brand to its L'Oréal division to support competitive benchmarking.
    config:
      meta:
        owner: dhwanijain2905@gmail.com
        grain: one row per brand
    columns:
      - name: brand_id
        description: MD5 surrogate key derived from brand_name.
        tests:
          - not_null
          - unique
      - name: brand_name
        description: Brand name as it appears on Sephora.
        tests:
          - not_null
      - name: division
        description: L'Oréal division — Luxe, Consumer Products, Dermatological, or Professional.
        tests:
          - not_null
          - accepted_values:
              values: ['Luxe', 'Consumer Products', 'Dermatological', 'Professional']

  - name: mart_whitespace_summary
    description: >
      Aggregated whitespace analysis at the desire-category grain, filtered to Lancôme products only.
      Each row represents one consumer need theme (e.g. SPF, Shade Range) and its
      volume, average rating context, and opportunity score.
      This is the primary table powering the dashboard's recommendation view.
    config:
      meta:
        owner: dhwanijain2905@gmail.com
        grain: one row per desire category
    columns:
      - name: desire_category
        description: Consumer need theme (e.g. SPF & Sun Protection, Shade Range & Inclusivity).
        tests:
          - not_null
          - unique
      - name: desire_count
        description: Number of Lancôme reviews containing desire language in this category.
        tests:
          - not_null
      - name: pct_of_all_desires
        description: Share of total Lancôme desire signals this category represents.
      - name: avg_rating
        description: Average star rating of reviews expressing this desire — lower = more painful unmet need.
      - name: negative_review_count
        description: Number of desire reviews that also have a negative sentiment (rating 1–2).
      - name: product_count
        description: Number of distinct Lancôme products mentioned in this desire category.
      - name: unique_reviewers
        description: Number of distinct Sephora reviewers expressing this desire.
      - name: opportunity_score
        description: >
          Composite score = (desire_count / total_desires) × (5 − avg_rating).
          Higher = more consumers want it AND are dissatisfied. Ranks whitespace priority.
        tests:
          - not_null

  - name: mart_product_performance
    description: >
      One row per Lancôme product with at least 5 reviews. Aggregates review volume,
      average rating, desire rate, complaint rate, and a whitespace score to identify
      which products have the most unmet consumer need.
    config:
      meta:
        owner: dhwanijain2905@gmail.com
        grain: one row per Lancôme product
    columns:
      - name: product_id
        description: Sephora product identifier.
        tests:
          - not_null
          - unique
      - name: product_name
        tests:
          - not_null
      - name: review_count
        description: Total number of reviews for this product.
        tests:
          - not_null
      - name: avg_rating
        description: Average star rating across all reviews.
        tests:
          - not_null
      - name: desire_rate
        description: Percentage of reviews containing desire language.
      - name: complaint_rate
        description: Percentage of reviews flagged as complaints.
      - name: whitespace_score
        description: desire_rate × complaint_rate × 100. Higher = bigger opportunity.
      - name: top_desire_category
        description: Most frequently occurring desire category across this product's reviews.

  - name: mart_sentiment_over_time
    description: >
      Monthly time series of Lancôme review volume, average rating, and desire/complaint
      signals. Supports descriptive analytics ("what happened over time?").
    config:
      meta:
        owner: dhwanijain2905@gmail.com
        grain: one row per month
    columns:
      - name: review_month
        description: First day of the calendar month.
        tests:
          - not_null
          - unique
      - name: review_count
        description: Number of Lancôme reviews submitted that month.
        tests:
          - not_null
      - name: avg_rating
        description: Average star rating for the month.
      - name: desire_rate
        description: Percentage of reviews that month containing desire language.
      - name: positive_rate
        description: Percentage of reviews with positive sentiment (rating 4–5).
      - name: negative_rate
        description: Percentage of reviews with negative sentiment (rating 1–2).

  - name: mart_competitor_benchmarks
    description: >
      One row per brand with at least 50 reviews. Benchmarks Lancôme against other
      brands on satisfaction, desire rate, and complaint rate to support competitive
      diagnostic analytics.
    config:
      meta:
        owner: dhwanijain2905@gmail.com
        grain: one row per brand
    columns:
      - name: brand_name
        description: Brand name as it appears on Sephora.
        tests:
          - not_null
          - unique
      - name: division
        description: L'Oréal division assignment.
      - name: is_lancome
        description: True when the brand is Lancôme.
        tests:
          - not_null
      - name: review_count
        description: Total reviews for this brand in the dataset.
        tests:
          - not_null
      - name: avg_rating
        description: Average star rating across all brand reviews.
      - name: desire_rate
        description: Percentage of reviews containing desire language.
      - name: complaint_rate
        description: Percentage of reviews flagged as complaints.
      - name: product_count
        description: Number of distinct products reviewed for this brand.
